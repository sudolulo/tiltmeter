name: ci

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff check .
      - name: tests (includes docs gates - readability, glossary, decision-block lint)
        run: uv run pytest -q

  docker:
    # image must always build; publish to GHCR only from main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build (and push from main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ghcr.io/sudolulo/tiltmeter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docs-sync:
    # Code and config may not change without a docs change in the same range.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: determine range and check
        env:
          EVENT: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$EVENT" == "pull_request" ]]; then
            range="origin/${BASE_REF}...HEAD"
          elif [[ "$BEFORE" =~ ^0+$ ]]; then
            echo "new branch push; skipping docs-sync"; exit 0
          else
            range="${BEFORE}..${SHA}"
          fi
          bash scripts/check_docs_sync.sh "$range"
