# Incumbent-rater reference ratings — VALIDATION ONLY (METHODOLOGY.md D7).
# These values are never an input to scoring; they exist so the M3 gate can
# compare tiltmeter's ordering against the incumbents' orderings.
#
# Integrity rules:
# - every value carries its source, retrieval date, and a verified flag
# - verified: false means "provisional, transcribed from secondary knowledge,
#   NOT yet confirmed on the rater's own site" — the M3 validation run MUST
#   NOT be reported against unverified values; re-verify on-site first
#   (allsides.com blocks automated fetches: verify manually in a browser)
# - allsides scale: Left / Lean Left / Center / Lean Right / Right,
#   mapped for correlation as -2 / -1 / 0 / +1 / +2 (news section rating,
#   never the opinion-section rating)
# - ad_fontes scale: numeric bias score (-42..+42), from adfontesmedia.com
#   source pages; null = not yet transcribed

ratings:
